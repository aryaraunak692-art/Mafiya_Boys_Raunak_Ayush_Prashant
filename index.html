<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three Brothers</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(to right,#e3f2fd,#fce4ec);
    color:#333;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    padding:20px 60px;
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.logo{
    font-weight:700;
    font-size:22px;
    color:#444;
}

nav ul{
    list-style:none;
    display:flex;
}

nav ul li{
    margin-left:30px;
}

nav ul li a{
    text-decoration:none;
    color:#666;
    transition:0.3s;
}

nav ul li a:hover{
    color:#000;
}

/* HERO */
.hero{
    height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

.hero h1{
    font-size:60px;
    font-weight:700;
}

.hero p{
    margin-top:20px;
    font-size:20px;
    color:#555;
}

/* TEAM */
.team{
    padding:80px 40px;
    text-align:center;
}

.team h2{
    margin-bottom:50px;
    font-size:35px;
}

.cards{
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
}

.card{
    background:white;
    padding:40px;
    width:260px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    transition:0.4s;
}

.card:hover{
    transform:translateY(-10px);
}

.card h3{
    margin-bottom:10px;
    font-size:22px;
}

.card p{
    color:#777;
}

/* FOOTER */
footer{
    text-align:center;
    padding:30px;
    background:white;
    margin-top:40px;
    color:#777;
}
</style>
</head>

<body>

<nav>
    <div class="logo">Three Brothers</div>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Our Bond</a></li>
        <li><a href="#">Memories</a></li>
    </ul>
</nav>

<section class="hero">
    <h1>Brothers Forever 🤝</h1>
    <p>Different personalities. Same heart. One strong bond.</p>
</section>

<section class="team">
    <h2>Meet Us</h2>
    <div class="cards">

        <div class="card">
            <h3>Raunak</h3>
            <p>Creative • Smart • Supportive</p>
        </div>

        <div class="card">
            <h3>Ayush</h3>
            <p>Funny • Loyal • Caring</p>
        </div>

        <div class="card">
            <h3>Prashant</h3>
            <p>Strong • Calm • Protective</p>
        </div>

    </div>
</section>

<footer>
Made with ❤️ by Raunak Arya
</footer>

</body>
</html>
